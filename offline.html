<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2d4f5c">
  <title>Hors ligne — Chan Ming POOL</title>
  <style>
    :root { color-scheme: light; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: #f5f1e8;
      color: #2d4f5c;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap {
      max-width: 560px;
      padding: 32px 28px;
      text-align: center;
    }
    h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 2.4rem;
      margin: 0 0 12px;
      font-weight: 600;
    }
    p { line-height: 1.6; color: #2d4f5c; opacity: 0.85; }
    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      background: #2d4f5c;
      color: #f5f1e8;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    button {
      margin-top: 16px;
      padding: 12px 24px;
      border: 0;
      border-radius: 8px;
      background: #2d4f5c;
      color: #f5f1e8;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1f3a44; }
    ul { text-align: left; line-height: 1.8; padding-left: 22px; }
    a { color: #2d4f5c; }
    .status {
      margin-top: 14px;
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="badge">Hors ligne</span>
    <h1>Pas de connexion</h1>
    <p>
      Cette page n’est pas encore en cache. Vous pouvez quand même
      consulter les pages déjà visitées récemment :
    </p>
    <ul>
      <li><a href="/">Accueil</a></li>
      <li><a href="/decisions.html">Décisions</a></li>
      <li><a href="/technique.html">Technique</a></li>
      <li><a href="/chantier.html">Chantier</a></li>
      <li><a href="/logistique.html">Logistique</a></li>
    </ul>
    <button type="button" onclick="location.reload()">Réessayer</button>
    <div class="status" id="net-status"></div>
  </div>
  <script>
    (function () {
      var s = document.getElementById('net-status');
      function refresh() {
        s.textContent = navigator.onLine
          ? "Connexion détectée — rechargez la page."
          : "Toujours hors ligne.";
      }
      window.addEventListener('online', refresh);
      window.addEventListener('offline', refresh);
      refresh();
    })();
  </script>
</body>
</html>
